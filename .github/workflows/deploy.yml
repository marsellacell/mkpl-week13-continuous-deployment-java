name: Java Maven Continuous Deployment Simulation

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy Java Maven Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Show project structure
        run: |
          echo "Menampilkan struktur awal project"
          ls -la
          echo "Cek file pom.xml"
          cat pom.xml

      - name: Build project with Maven
        run: |
          echo "Menjalankan proses build menggunakan Maven"
          mvn clean package

      - name: Show build result
        run: |
          echo "Menampilkan hasil build pada folder target"
          ls -la target

      - name: Prepare deployment package
        run: |
          echo "Menyiapkan package untuk simulasi deployment"
          mkdir -p deployment-package
          cp target/*.jar deployment-package/ || true
          echo "Isi deployment package:"
          ls -la deployment-package

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-maven-deployment-package
          path: deployment-package/

      - name: Simulate Continuous Deployment
        run: |
          echo "=========================================="
          echo "SIMULASI CONTINUOUS DEPLOYMENT BERHASIL"
          echo "Source code berhasil diambil dari GitHub"
          echo "Project Java berhasil dibuild menggunakan Maven"
          echo "Hasil build berhasil dibuat sebagai artifact"
          echo "Artifact dapat diakses/download oleh user"
          echo "=========================================="